<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Swap - Sala de Estudio</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; }
        /* Le damos un tamaño al contenedor donde vivirá la llamada */
        #contenedor-llamada {
            width: 80%;
            height: 600px;
            margin: 20px auto;
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            display: none; /* Lo mantenemos oculto hasta que empiece la llamada */
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h1>Bienvenido a tu mentoría en Learning Swap</h1>
    
    <!-- Botón para iniciar -->
    <button id="btn-iniciar">Entrar a la Videollamada</button>

    <!-- Aquí es donde Jitsi inyectará la cámara y el chat -->
    <div id="contenedor-llamada"></div>

    <!-- 1️⃣ Importamos la librería oficial de Jitsi -->
    <script src="https://meet.jit.si/external_api.js"></script>
    
    <!-- Vinculamos nuestro archivo JavaScript -->
    <script src="./app.js"></script>

</body>
</html>
